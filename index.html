<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Moderation Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eaeaea;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .connection-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .connected {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
        }

        .disconnected {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.4s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .new-message {
            border-left: 4px solid #00d4ff;
            animation: pulse 2s;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 212, 255, 0.2); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
        }

        .user-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .user-id {
            font-family: monospace;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .user-id:hover {
            color: #00d4ff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .badge-owner { background: #ffd700; color: #000; }
        .badge-admin { background: #ff4444; color: #fff; }
        .badge-moderator { background: #44ff44; color: #000; }
        .badge-bot { background: #7289da; color: #fff; }
        .badge-member { background: #666; color: #fff; }

        .message-content {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 15px 0;
            word-break: break-word;
        }

        .meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #888;
            flex-wrap: wrap;
        }

        .meta span {
            color: #00d4ff;
        }

        .timestamp {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #666;
            font-size: 0.85rem;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00d4ff;
            color: #1a1a2e;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Discord Moderation Tracker</h1>
            <p>Live monitoring of messages with more than 10 characters</p>
            <div class="connection-status disconnected" id="status">● Disconnected</div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div>Messages Logged</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueCount">0</div>
                <div>Unique Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayCount">0</div>
                <div>Today</div>
            </div>
        </div>

        <div id="messages" class="messages-container">
            <div class="loading">Waiting for messages...</div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const API_URL = 'http://localhost:5000';
        let lastMessageCount = 0;

        function getBadgeClass(role) {
            const classes = {
                'owner': 'badge-owner',
                'admin': 'badge-admin',
                'moderator': 'badge-moderator',
                'bot': 'badge-bot'
            };
            return classes[role] || 'badge-member';
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString();
        }

        function copyId(id) {
            navigator.clipboard.writeText(id);
            showToast('ID copied!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function fetchMessages() {
            try {
                const response = await fetch(`${API_URL}/api/messages`);
                const messages = await response.json();
                
                document.getElementById('status').className = 'connection-status connected';
                document.getElementById('status').textContent = '● Connected';
                
                if (messages.length !== lastMessageCount) {
                    renderMessages(messages);
                    lastMessageCount = messages.length;
                }
            } catch (e) {
                document.getElementById('status').className = 'connection-status disconnected';
                document.getElementById('status').textContent = '● Disconnected';
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const stats = await response.json();
                document.getElementById('totalCount').textContent = stats.total;
                document.getElementById('uniqueCount').textContent = stats.uniqueUsers;
                document.getElementById('todayCount').textContent = stats.today;
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty"><h2>📭 No messages yet</h2><p>Send a message with more than 10 characters in Discord!</p></div>';
                return;
            }

            container.innerHTML = messages.map((msg, index) => `
                <div class="message-card ${index === 0 ? 'new-message' : ''}">
                    <div class="timestamp">${formatTime(msg.timestamp)}</div>
                    
                    <div class="message-header">
                        <img src="${msg.user.avatar}" class="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                        <div class="user-info">
                            <h3>${msg.user.globalName || msg.user.username}</h3>
                            <div class="user-id" onclick="copyId('${msg.user.id}')">
                                @${msg.user.username}${msg.user.discriminator ? '#' + msg.user.discriminator : ''} 
                                • ID: ${msg.user.id} 📋
                            </div>
                            <span class="badge ${getBadgeClass(msg.user.role)}">${msg.user.role}</span>
                        </div>
                    </div>
                    
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                    
                    <div class="meta">
                        <div><span>📱</span> #${msg.channelName}</div>
                        <div><span>🖥️</span> ${msg.guildName}</div>
                        <div><span>📝</span> ${msg.contentLength} chars</div>
                        <div><span>🔗</span> ${msg.messageId.slice(-6)}</div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Refresh every 2 seconds
        setInterval(() => {
            fetchMessages();
            fetchStats();
        }, 2000);

        fetchMessages();
        fetchStats();
    </script>
</body>
</html>
